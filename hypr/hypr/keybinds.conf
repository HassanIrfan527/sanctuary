$mod = SUPER

# ══════════════════════════════════════════════════════════
# UI-SPECIFIC BINDS are in ~/.config/hypr/ui-keybinds.conf
# (swapped by switch-ui.sh between Quickshell and Cozy modes)
# ══════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════
# THEME SWITCHER (works in both UI modes)
# ══════════════════════════════════════════════════════════
bind = $mod SHIFT, T, exec, printf 'default\ncozy-night\ncozy-day' | fuzzel --dmenu -p "Theme: " --width 25 --lines 3 --border-radius 12 --border-width 2 --inner-pad 10 | xargs ~/.config/themes/switch-ui.sh

# ══════════════════════════════════════════════════════════
# LAUNCH APPS
# ══════════════════════════════════════════════════════════
bind = $mod, RETURN, exec, kitty
bind = $mod, E, exec, nautilus
bind = $mod, Y, exec, kitty -e yazi
bind = $mod, B, exec, google-chrome-stable
bind = $mod, C, exec, code

# ══════════════════════════════════════════════════════════
# WINDOW MANAGEMENT
# ══════════════════════════════════════════════════════════
bind = $mod, W, killactive,
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen, 0
bind = $mod, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, S, togglesplit,

# ══════════════════════════════════════════════════════════
# FOCUS (vim hjkl + arrow keys)
# ══════════════════════════════════════════════════════════
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# ══════════════════════════════════════════════════════════
# MOVE WINDOWS (vim hjkl + Shift)
# ══════════════════════════════════════════════════════════
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# ══════════════════════════════════════════════════════════
# RESIZE (vim hjkl + Alt)
# ══════════════════════════════════════════════════════════
bind = $mod ALT, H, resizeactive, -40 0
bind = $mod ALT, J, resizeactive, 0 40
bind = $mod ALT, K, resizeactive, 0 -40
bind = $mod ALT, L, resizeactive, 40 0

# ══════════════════════════════════════════════════════════
# WORKSPACES (numpad — matches GNOME Super+numpad)
# ══════════════════════════════════════════════════════════
bind = $mod, KP_End, workspace, 1
bind = $mod, KP_Down, workspace, 2
bind = $mod, KP_Next, workspace, 3
bind = $mod, KP_Left, workspace, 4
bind = $mod, KP_Begin, workspace, 5
bind = $mod, KP_Right, workspace, 6
bind = $mod, KP_Home, workspace, 7
bind = $mod, KP_Up, workspace, 8
bind = $mod, KP_Prior, workspace, 9

# ── Workspaces (number row — fallback) ──
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# ── Move to Workspace (Shift+Super+numpad) ──
bind = $mod SHIFT, KP_End, movetoworkspace, 1
bind = $mod SHIFT, KP_Down, movetoworkspace, 2
bind = $mod SHIFT, KP_Next, movetoworkspace, 3
bind = $mod SHIFT, KP_Left, movetoworkspace, 4
bind = $mod SHIFT, KP_Begin, movetoworkspace, 5
bind = $mod SHIFT, KP_Right, movetoworkspace, 6
bind = $mod SHIFT, KP_Home, movetoworkspace, 7
bind = $mod SHIFT, KP_Up, movetoworkspace, 8
bind = $mod SHIFT, KP_Prior, movetoworkspace, 9

# ── Move to Workspace (number row — fallback) ──
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── Workspace Cycle (CapsLock+n/m via keyd → Super+n/m) ──
bind = $mod, N, workspace, e-1
bind = $mod, M, workspace, e+1
bind = $mod SHIFT, N, movetoworkspace, e-1
bind = $mod SHIFT, M, movetoworkspace, e+1

# ══════════════════════════════════════════════════════════
# SYSTEM
# ══════════════════════════════════════════════════════════
bind = $mod, ESCAPE, exec, hyprlock
bind = $mod, DELETE, exec, wlogout

# ══════════════════════════════════════════════════════════
# SCREENSHOTS (grimblast fallback)
# ══════════════════════════════════════════════════════════
bind = , Print, exec, grimblast copy area && notify-send "Screenshot" "Area copied to clipboard"
bind = SHIFT, Print, exec, grimblast copy screen && notify-send "Screenshot" "Screen copied to clipboard"
bind = $mod, Print, exec, grimblast copysave area ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Saved and copied"

# ══════════════════════════════════════════════════════════
# MEDIA CONTROLS
# ══════════════════════════════════════════════════════════
bind = $mod SHIFT, P, exec, playerctl play-pause
bind = $mod SHIFT, bracketright, exec, playerctl next
bind = $mod SHIFT, bracketleft, exec, playerctl previous

# ══════════════════════════════════════════════════════════
# VOLUME (laptop keys + backup shortcuts)
# ══════════════════════════════════════════════════════════
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t
bindel = $mod, equal, exec, pamixer -i 5
bindel = $mod, minus, exec, pamixer -d 5
bindl = $mod, 0, exec, pamixer -t

# ══════════════════════════════════════════════════════════
# BRIGHTNESS (laptop keys)
# ══════════════════════════════════════════════════════════
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ══════════════════════════════════════════════════════════
# NIGHT LIGHT TEMPERATURE
# ══════════════════════════════════════════════════════════
bind = $mod SHIFT, EQUAL, exec, pkill gammastep; gammastep -O 3500
bind = $mod SHIFT, MINUS, exec, pkill gammastep; gammastep -O 4500
bind = $mod SHIFT, 0, exec, pkill gammastep; gammastep -O 3800

# ══════════════════════════════════════════════════════════
# MOUSE
# ══════════════════════════════════════════════════════════
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
