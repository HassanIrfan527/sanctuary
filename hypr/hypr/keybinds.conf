$mod = SUPER

# ══════════════════════════════════════════════════════════
# UI-SPECIFIC BINDS are in ~/.config/hypr/ui-keybinds.conf
# ══════════════════════════════════════════════════════════

#! Apps & Windows
##! Launch Apps
bind = $mod, RETURN, exec, kitty # Terminal
bind = $mod, E, exec, nautilus # File manager
bind = $mod, Y, exec, kitty -e yazi # Yazi file manager
bind = $mod, B, exec, google-chrome-stable # Browser
bind = $mod, C, exec, code # VS Code
bing = $mod, Z, exec, flatpak run app.zen_browser.zen # Zen browser
##! Window Management
bind = $mod, W, killactive,
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen, 0
bind = $mod, V, togglefloating,
bind = $mod, P, pin
bind = $mod, S, layoutmsg, togglesplit
bind = $mod, G, togglegroup
bind = $mod SHIFT, G, lockactivegroup, toggle
bind = $mod, TAB, changegroupactive, f
bind = $mod SHIFT, TAB, changegroupactive, b
bind = $mod, D, togglespecialworkspace, scratchterm
bind = $mod SHIFT, T, exec, [workspace special:scratchterm] kitty
bind = $mod SHIFT, C, centerwindow
bind = $mod CTRL, H, swapwindow, l
bind = $mod CTRL, J, swapwindow, d
bind = $mod CTRL, K, swapwindow, u
bind = $mod CTRL, L, swapwindow, r

##! Focus
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

#! Move & Resize
##! Move Windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

##! Resize
bind = $mod ALT, H, resizeactive, -40 0
bind = $mod ALT, J, resizeactive, 0 40
bind = $mod ALT, K, resizeactive, 0 -40
bind = $mod ALT, L, resizeactive, 40 0

##! Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, KP_End, workspace, 1 # [hidden]
bind = $mod, KP_Down, workspace, 2 # [hidden]
bind = $mod, KP_Next, workspace, 3 # [hidden]
bind = $mod, KP_Left, workspace, 4 # [hidden]
bind = $mod, KP_Begin, workspace, 5 # [hidden]
bind = $mod, KP_Right, workspace, 6 # [hidden]
bind = $mod, KP_Home, workspace, 7 # [hidden]
bind = $mod, KP_Up, workspace, 8 # [hidden]
bind = $mod, KP_Prior, workspace, 9 # [hidden]
bind = $mod, N, workspace, e-1 # Workspace: focus left
bind = $mod, M, workspace, e+1 # Workspace: focus right

#! Move to WS & System
##! Move to Workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, KP_End, movetoworkspace, 1 # [hidden]
bind = $mod SHIFT, KP_Down, movetoworkspace, 2 # [hidden]
bind = $mod SHIFT, KP_Next, movetoworkspace, 3 # [hidden]
bind = $mod SHIFT, KP_Left, movetoworkspace, 4 # [hidden]
bind = $mod SHIFT, KP_Begin, movetoworkspace, 5 # [hidden]
bind = $mod SHIFT, KP_Right, movetoworkspace, 6 # [hidden]
bind = $mod SHIFT, KP_Home, movetoworkspace, 7 # [hidden]
bind = $mod SHIFT, KP_Up, movetoworkspace, 8 # [hidden]
bind = $mod SHIFT, KP_Prior, movetoworkspace, 9 # [hidden]
bind = $mod SHIFT, N, movetoworkspace, e-1 # Window: move to left workspace
bind = $mod SHIFT, M, movetoworkspace, e+1 # Window: move to right workspace

##! System
bind = $mod, ESCAPE, exec, ~/.config/qylock/quickshell-lockscreen/lock.sh
bind = $mod, DELETE, exec, wlogout # Logout menu

##! Screenshots
bind = , Print, exec, grimblast copy area && notify-send "Screenshot" "Area copied to clipboard" # Copy area
bind = SHIFT, Print, exec, grimblast copy screen && notify-send "Screenshot" "Screen copied to clipboard" # Copy screen
bind = $mod, Print, exec, grimblast copysave area ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Saved and copied" # Save area

##! Media & Volume
bind = $mod SHIFT, P, exec, playerctl play-pause # Play/Pause
bind = $mod SHIFT, bracketright, exec, playerctl next # Next track
bind = $mod SHIFT, bracketleft, exec, playerctl previous # Previous track
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5 # [hidden]
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5 # [hidden]
bindl = , XF86AudioMute, exec, pamixer -t # [hidden]
bindel = $mod, equal, exec, pamixer -i 5 # Volume up
bindel = $mod, minus, exec, pamixer -d 5 # Volume down
bindl = $mod, 0, exec, pamixer -t # Mute toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5% # [hidden]
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- # [hidden]

##! Key Sounds
bind = $mod SHIFT, B, exec, ~/.config/hypr/scripts/toggle-keysounds.sh
bind = $mod ALT, B, exec, ~/.config/hypr/scripts/switch-keysound-theme.sh

##! SE 101 Bug Capture
bind = $mod, I, exec, ~/.config/hypr/scripts/bug-capture.sh
bind = $mod SHIFT, I, exec, kitty --class=bug-browse --title=bugs -e zsh -i -c 'cd "$SE101_BUGS" && nvim "$(ls -t *.md 2>/dev/null | fzf)"'

##! Night Light & Mouse
bind = $mod SHIFT, EQUAL, exec, pkill gammastep; gammastep -O 3500 # Warm
bind = $mod SHIFT, MINUS, exec, pkill gammastep; gammastep -O 4500 # Cool
bind = $mod SHIFT, 0, exec, pkill gammastep; gammastep -O 3800 # Default
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , J, resizeactive, 0 40
binde = , K, resizeactive, 0 -40
binde = , L, resizeactive, 40 0
binde = , left, resizeactive, -40 0
binde = , down, resizeactive, 0 40
binde = , up, resizeactive, 0 -40
binde = , right, resizeactive, 40 0
bind = , ESCAPE, submap, reset
bind = , RETURN, submap, reset
submap = reset
