# Float specific apps
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(org.gnome.Calendar)$
windowrulev2 = float, class:^(org.gnome.Weather)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(org.gnome.Nautilus)$, title:^(Properties)$

# Calendar popup positioning
windowrulev2 = size 400 500, class:^(org.gnome.Calendar)$
windowrulev2 = move 100%-410 40, class:^(org.gnome.Calendar)$

# Picture-in-picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 360 200, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-370 100%-210, title:^(Picture-in-Picture)$

# File dialogs float and center
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Open Folder)$

# Games — immediate tearing
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(gamescope)$

# Tiled windows — no shadow
windowrulev2 = noshadow 1, floating:0

# ══════════════════════════════════════════════════════════
# QUICKSHELL LAYER RULES (0.51.x syntax)
# ══════════════════════════════════════════════════════════
layerrule = blur, quickshell:bar
layerrule = blur, quickshell:dock
layerrule = blur, quickshell:sidebarRight
layerrule = blur, quickshell:sidebarLeft
layerrule = blur, quickshell:session
layerrule = blur, quickshell:notificationPopup
layerrule = blur, quickshell:overview
layerrule = blur, quickshell:popup
layerrule = blur, quickshell:mediaControls
layerrule = blur, quickshell:cheatsheet
layerrule = blur, quickshell:wallpaperSelector
layerrule = blur, quickshell:actionCenter

layerrule = ignorealpha 0.79, quickshell:bar
layerrule = ignorealpha 0.79, quickshell:dock
layerrule = ignorealpha 0.79, quickshell:sidebarRight
layerrule = ignorealpha 0.79, quickshell:sidebarLeft
layerrule = ignorealpha 0, quickshell:session
layerrule = ignorealpha 1, quickshell:overlay
layerrule = ignorealpha 1, quickshell:popup
layerrule = ignorealpha 1, quickshell:mediaControls

layerrule = animation slide, quickshell:bar
layerrule = animation slide bottom, quickshell:dock
layerrule = animation slide bottom, quickshell:cheatsheet
layerrule = animation slide right, quickshell:sidebarRight
layerrule = animation slide left, quickshell:sidebarLeft
layerrule = animation slide top, quickshell:wallpaperSelector
layerrule = animation slide, quickshell:reloadPopup
layerrule = animation slide, quickshell:verticalBar
layerrule = animation fade, quickshell:notificationPopup

layerrule = noanim, quickshell:overlay
layerrule = noanim, quickshell:overview
layerrule = noanim, quickshell:session
layerrule = noanim, quickshell:regionSelector
layerrule = noanim, quickshell:screenshot
layerrule = noanim, quickshell:lockWindowPusher
layerrule = noanim, quickshell:polkit
layerrule = noanim, quickshell:actionCenter

# Fuzzel launcher
layerrule = noanim, gtk4-layer-shell
