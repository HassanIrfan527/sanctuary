# Portal & authentication
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

# Core services
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = wl-paste --watch cliphist store
exec-once = hypridle

# Bottom dock
exec-once = nwg-dock-hyprland -d -i 36 -w 10 -mb 6 -hd 0 -nolauncher

# GTK theme (via gsettings — safe for GNOME coexistence)
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'oreo_spark_purple_cursors'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24

# Night light — always warm (~3800K, matching GNOME night light preset)
# Using gammastep for reliable always-on (survives fullscreen)
exec-once = gammastep -O 3800

# Apply saved theme on login
exec-once = bash ~/.config/themes/switch-theme.sh $(cat ~/.config/themes/current 2>/dev/null || echo cozy)
