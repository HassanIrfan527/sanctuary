# Portal & authentication
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

# Quickshell (replaces waybar, swaync, dock)
exec-once = qs -c $qsConfig &

# Core services
exec-once = swww-daemon
exec-once = hypridle

# Clipboard (with Quickshell notification)
exec-once = wl-paste --type text --watch bash -c 'cliphist store && qs -c ii ipc call cliphistService update 2>/dev/null'
exec-once = wl-paste --type image --watch bash -c 'cliphist store && qs -c ii ipc call cliphistService update 2>/dev/null'

# Keyring
exec-once = gnome-keyring-daemon --start --components=secrets

# GTK theme (via gsettings — safe for GNOME coexistence)
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Night light
exec-once = gammastep -O 3800
