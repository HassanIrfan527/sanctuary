$qsConfig = ii

source = ~/.config/hypr/env.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/ui-keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/colors.conf

monitor = , preferred, auto, 1

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        xray = false
        special = true
        new_optimizations = true
        size = 10
        passes = 3
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }
    shadow {
        enabled = true
        ignore_window = true
        range = 50
        offset = 0 4
        render_power = 10
        color = rgba(00000027)
    }
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}

animations {
    enabled = true
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    animation = workspaces, 1, 7, menu_decel, slide
    animation = specialWorkspaceIn, 1, 3, emphasizedDecel, slidefadevert -50%
    animation = specialWorkspaceOut, 1, 1.5, emphasizedAccel, slidefadevert -50%
}

group {
    insert_after_current = false
    col.border_active = rgba(cbc4cbee)
    col.border_inactive = rgba(49464aaa)
    groupbar {
        enabled = true
        font_family = JetBrains Mono
        font_size = 11
        height = 22
        indicator_height = 3
        gaps_in = 3
        gaps_out = 3
        col.active = rgba(363435ee)
        col.inactive = rgba(1c1b1cdd)
        text_color = rgba(e6e1e1ff)
        rounding = 6
        gradient_rounding = 6
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

input {
    kb_layout = us
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    follow_mouse = 1
    sensitivity = 0
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 1
}

workspace = special:scratchterm, gapsout:80
