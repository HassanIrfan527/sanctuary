source = ~/.config/hypr/env.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/theme.conf

monitor = DP-3, 1440x900@60, 0x0, 1

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        popups = true
        xray = false
    }
    blurls = waybar
    blurls = rofi
    blurls = notifications
    blurls = swaync-control-center
    shadow {
        enabled = true
        range = 8
        render_power = 2
    }
}

animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1
    animation = windows, 1, 3, snappy, slide
    animation = fade, 1, 3, snappy
    animation = workspaces, 1, 2, snappy, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Layer blur rules (for floating modules)
layerrule = blur, notifications
layerrule = blur, swaync-control-center
layerrule = ignorealpha 0.3, notifications
layerrule = ignorealpha 0.3, swaync-control-center
layerrule = blur, rofi
layerrule = ignorealpha 0.3, rofi
