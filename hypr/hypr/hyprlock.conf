background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    outer_color = rgba(ffffff33)
    inner_color = rgba(00000088)
    font_color = rgba(ffffffee)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME12
    color = rgba(ffffffee)
    font_size = 72
    font_family = Google Sans Flex

    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %B %d"
    color = rgba(ffffffbb)
    font_size = 18
    font_family = Google Sans Flex

    position = 0, 80
    halign = center
    valign = center
}
