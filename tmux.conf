# ── Prefix ──
set -g prefix M-a
unbind C-b
unbind C-a
unbind C-Space
bind M-a send-prefix

bind -N "Reload tmux config" r source-file ~/.tmux.conf \; display "Reloaded"
# ── Terminal ──
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"
set-option -g default-shell "/usr/bin/zsh"

# ── General ──
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g set-clipboard on
setw -g mode-keys vi
set -g status-interval 1
set -g focus-events on

# ── Windows (tabs) ──
bind -N "New window" c new-window -c "#{pane_current_path}"
bind -N "Previous window" p previous-window
bind -N "Next window" n next-window
bind -N "Kill current window" x kill-window
bind -N "Go to window 1" 1 select-window -t 1
bind -N "Go to window 2" 2 select-window -t 2
bind -N "Go to window 3" 3 select-window -t 3
bind -N "Go to window 4" 4 select-window -t 4
bind -N "Go to window 5" 5 select-window -t 5
# ── Splits (panes) ──
bind -N "Split horizontal (below)" S split-window -v -c "#{pane_current_path}"
bind -N "Split vertical (right)" V split-window -h -c "#{pane_current_path}"
bind -N "Kill current pane" X kill-pane
# ── Pane navigation ──
bind -N "Cycle pane" Tab select-pane -t :.+
bind -N "Pane left" h select-pane -L
bind -N "Pane down" j select-pane -D
bind -N "Pane up" k select-pane -U
bind -N "Pane right" l select-pane -R
# ── Pane resize ──
bind -N "Resize left" -r H resize-pane -L 5
bind -N "Resize down" -r J resize-pane -D 5
bind -N "Resize up" -r K resize-pane -U 5
bind -N "Resize right" -r L resize-pane -R 5
# ── Zoom ──
bind -N "Toggle zoom" z resize-pane -Z
# ── Help: show all bindings in a popup ──
bind -N "Show keybinds" ? display-popup -E -w 80% -h 80% "tmux list-keys -N | sort | less -R"
# ── Copy mode ──
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "wl-copy"
bind -T copy-mode-vi Enter send-keys -X cancel
set -g @copy_mode_yank "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# ── Auto-hide status when focused on nvim, show otherwise ──
# Works with the VimEnter/VimLeave autocmd in nvim init.lua.
# These hooks handle tab/pane switching so the bar reappears
# when you move to a non-nvim tab.
set-hook -g after-select-window 'if -F "#{==:#{pane_current_command},nvim}" "set status off" "set status on"'
set-hook -g after-select-pane 'if -F "#{==:#{pane_current_command},nvim}" "set status off" "set status on"'

# ╔══════════════════════════════════════════════════════════════╗
# ║  Bubbles theme — matches nvim lualine bubbles config         ║
# ║  violet normal · blue insert · cyan visual · red replace     ║
# ╚══════════════════════════════════════════════════════════════╝

# Default mode (updated live by zsh-vi-mode hook in ~/.dotfiles/zsh/keybinds.zsh)
set -g @zvm_mode "INSERT"
set -g @zvm_mode_color "#80a0ff"

# ── Status line ──
set -g status on
set -g status-position bottom
set -g status-justify "left"
set -g status-style "bg=default,fg=#c6c6c6"
set -g status-left-length 200
set -g status-right-length 200

# Left bubble: mode  ·  session  ·  path  ·  git  ·  window tabs
set -g status-left ""
set -ga status-left "#[fg=#{@zvm_mode_color}]#[bg=default]"
set -ga status-left "#[fg=#080808]#[bg=#{@zvm_mode_color}]#[bold] #{@zvm_mode} "
set -ga status-left "#[nobold]#[fg=#{@zvm_mode_color}]#[bg=#303030]"
set -ga status-left "#[fg=#c6c6c6]#[bg=#303030]  #S "
set -ga status-left "#[fg=#808080]#[bg=#303030]│"
set -ga status-left "#[fg=#c6c6c6]#[bg=#303030] #{s|/home/anonymous|~|:pane_current_path} "
set -ga status-left "#[fg=#808080]#[bg=#303030]#(b=$(~/.dotfiles/tmux/scripts/git.sh); [ -n \"$b\" ] && echo '│ ')"
set -ga status-left "#[fg=#a6e3a1]#[bg=#303030]#(b=$(~/.dotfiles/tmux/scripts/git.sh); [ -n \"$b\" ] && echo \"󰘬 $b \")"
set -ga status-left "#[fg=#808080]#[bg=#303030]│"
# set -ga status-left "#{W:#[fg=#6c7086]#[bg=#303030] #I:#W ,#[fg=#79dac8]#[bg=#303030]#[bold] #I:#W #[nobold]}"
set -ga status-left "#{W:#[fg=#6c7086]#[bg=#303030]   #W ,#[fg=#79dac8]#[bg=#303030]#[bold]  󱘗 #W #[nobold]}"
set -ga status-left "#[fg=#303030]#[bg=default]"

# Right: bugs  ·  music
set -g status-right-length 400
set -g status-right ""
set -ga status-right "#(~/.dotfiles/tmux/scripts/bugs.sh)"
set -ga status-right "#[fg=#303030,bg=default]"
set -ga status-right "#[fg=#c6c6c6,bg=#303030] 󰝚 #(playerctl metadata --format '{{title}} — {{artist}}' 2>/dev/null | cut -c1-40) "
set -ga status-right "#[fg=#303030,bg=default]"

set -wg automatic-rename on
set -wg automatic-rename-format "#{b:pane_current_command}"

# Silence tmux's default middle-zone window list — tabs are rendered
# inline inside status-left via #{W:...} instead.
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# ── Pane borders ──
setw -g pane-border-status off
setw -g pane-active-border-style "fg=#d183e8"
setw -g pane-border-style "fg=#303030"
setw -g pane-border-lines single

# ╔══════════════════════════════════════════════════════════════╗
# ║                        TPM plugins                           ║
# ╚══════════════════════════════════════════════════════════════╝

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Explicitly free Ctrl-H/J/K/L at root — vim-tmux-navigator used to bind
# them and they linger after config reload. This restores Ctrl-L (clear),
# Ctrl-J (Enter), etc. in zsh.
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
unbind -n 'C-\'

# ── Mouse passthrough for TUI apps ──
# When a pane is running an alternate-screen TUI (claude, less, man, nvim,
# htop, etc.), forward mouse wheel events to the app instead of entering
# tmux copy mode. Outside alt-screen, scroll-up enters copy mode.
bind -n WheelUpPane if-shell -F -t = "#{alternate_on}" \
  "send-keys -M" \
  "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane if-shell -F -t = "#{alternate_on}" \
  "send-keys -M" \
  "send-keys -M"

# Initialize TPM — keep this line at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'
