"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
${custom.bugs}\
$fill\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$conda\
$pixi\
$time
$status$character"""

palette = 'everforest'

[palettes.everforest]
bg0 = '#2D353B'
bg1 = '#343F44'
bg2 = '#3D484D'
bg3 = '#475258'
fg = '#D3C6AA'
red = '#E67E80'
orange = '#E69875'
yellow = '#DBBC7F'
green = '#A7C080'
aqua = '#83C092'
blue = '#7FBBB3'
purple = '#D699B6'
grey0 = '#7A8478'
grey1 = '#859289'
grey2 = '#9DA9A0'

[os]
disabled = false
style = "bg:green fg:bg0"
format = "[](fg:green)[ $os ](bg:green fg:bg0)[](fg:green) "

[os.symbols]
Windows = "¾░ı▓"
Ubuntu = "¾░òê"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = ""
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = ""
CentOS = ""
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = ""

[username]
show_always = true
style_user = "bg:green fg:bg0"
style_root = "bg:green fg:bg0"
format = "[](fg:green)[ $user ](bg:green fg:bg0)[](fg:green) "

[directory]
style = "bg:blue fg:bg0"
format = "[](fg:blue)[ $path ](bg:blue fg:bg0)[](fg:blue) "
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Developer" = "¾░▓ï "

[git_branch]
symbol = ""
style = "bg:aqua fg:bg0"
format = "[](fg:aqua)[ $symbol $branch ](bg:aqua fg:bg0)[](fg:aqua) "

[git_status]
style = "bg:aqua fg:bg0"
format = "[](fg:aqua)[($all_status$ahead_behind )](bg:aqua fg:bg0)[](fg:aqua) "

[fill]
style = "fg:bg2"
symbol = " "

[c]
symbol = " "
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol$version ](bg:bg2 fg:yellow)[](fg:bg2)"

[cpp]
symbol = " "
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol$version ](bg:bg2 fg:yellow)[](fg:bg2)"

[rust]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[golang]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[nodejs]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[php]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[java]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[kotlin]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[haskell]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[python]
symbol = ""
style = "bg:bg2 fg:yellow"
format = " [](fg:bg2)[ $symbol $version ](bg:bg2 fg:yellow)[](fg:bg2)"

[docker_context]
symbol = ""
style = "bg:bg2 fg:aqua"
format = " [](fg:bg2)[ $symbol $context ](bg:bg2 fg:aqua)[](fg:bg2)"

[conda]
style = "bg:bg2 fg:aqua"
format = " [](fg:bg2)[ $symbol $environment ](bg:bg2 fg:aqua)[](fg:bg2)"

[pixi]
style = "bg:bg2 fg:aqua"
format = " [](fg:bg2)[ $symbol $version $environment ](bg:bg2 fg:aqua)[](fg:bg2)"

[time]
disabled = false
time_format = "%R"
style = "bg:bg3 fg:fg"
format = " [](fg:bg3)[  $time ](bg:bg3 fg:fg)[](fg:bg3)"

[line_break]
disabled = false

[status]
disabled = false
symbol = 'Ô£ù '
format = '[$symbol$status ](bold fg:red)'

[custom.bugs]
description = "SE 101 bugs captured in last 7d (shift hours only)"
command = "find '/mnt/PERSONAL/Obsidian/SE 101/Bugs' -maxdepth 1 -type f -name '*.md' ! -name 'README.md' -mtime -7 2>/dev/null | wc -l"
when = "test $(date +%H) -ge 18 -o $(date +%H) -le 3"
shell = ["sh", "-c"]
format = '[­şÉø $output ]($style)'
style = 'fg:yellow'

[character]
disabled = false
success_symbol = '[](bold fg:green)'
error_symbol = '[](bold fg:red)'
vimcmd_symbol = '[](bold fg:green)'
vimcmd_replace_one_symbol = '[](bold fg:purple)'
vimcmd_replace_symbol = '[](bold fg:purple)'
vimcmd_visual_symbol = '[](bold fg:yellow)'
