# Kitty Configuration
# ==================

# Include active theme colors (swapped by switch-theme.sh)
include current-theme.conf

# Window Layout
remember_window_size no
initial_window_width  110c
initial_window_height 39c
placement_strategy center
hide_window_decorations yes
window_padding_width 8

# Fonts
font_family      Maple Mono NF
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF Bold Italic
font_size 12.0
disable_ligatures never

# Fall back to Symbols Nerd Font for Powerline + icons range
# (Maple Mono NF ships base icons but not Powerline Extra U+E0B4-E0BF)
symbol_map U+E0A0-U+E0D4 Symbols Nerd Font
symbol_map U+F0000-U+FFFFD Symbols Nerd Font

# Transparency
background_opacity 0.7
background_blur 4
dynamic_background_opacity yes

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# Performance
sync_to_monitor yes
repaint_delay 10
input_delay 3
touch_scroll_multiplier 1.0

# Shell Integration
shell_integration enabled

# Window Management
window_resize_step_cells 2
window_resize_step_lines 2
confirm_os_window_close -1

# Tab Bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

# Keyboard Shortcuts
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0
map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>d set_background_opacity default

# Misc
allow_remote_control yes
update_check_interval 0
enable_audio_bell no
visual_bell_duration 0.0
url_style curly
copy_on_select no
strip_trailing_spaces smart
