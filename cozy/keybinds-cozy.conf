# UI-specific keybinds — Cozy mode (waybar + wofi + swaync)
$mod = SUPER
bind = $mod, SPACE, exec, pkill wofi || wofi --show drun --term=kitty --width=20% --height=50% --columns 1 -I
bind = $mod, PERIOD, exec, swaync-client -t
bind = $mod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, W, exec, GTK_THEME=Adwaita:dark waypaper --backend swww --folder ~/Pictures/wallpapers
bind = $mod SHIFT, S, exec, grimblast copy area && notify-send "Screenshot" "Copied"
bind = Ctrl+Alt, Delete, exec, wlogout
bind = Ctrl+$mod, R, exec, killall waybar swaync; waybar & swaync &
